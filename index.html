<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neuronal3D</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: radial-gradient(120% 80% at 50% -20%, #152238 0%, #070a10 45%, #050608 100%);
        color: #e8edf4;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
      }
      .modeRailOuter {
        grid-area: rail;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.35rem;
        min-width: 0;
      }
      #shellChrome {
        flex: 0 0 auto;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        grid-template-areas: "brand rail status";
        align-items: center;
        gap: 0.75rem 1rem;
        padding: 0.55rem 1rem 0.75rem;
        background: linear-gradient(180deg, rgba(18, 24, 38, 0.97) 0%, rgba(10, 14, 22, 0.98) 100%);
        border-bottom: 1px solid rgba(88, 120, 168, 0.22);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      }
      .shellBrand {
        grid-area: brand;
        display: flex;
        flex-direction: column;
        gap: 0.1rem;
        min-width: 0;
      }
      .shellLogo {
        font-weight: 700;
        font-size: 1.05rem;
        letter-spacing: 0.04em;
        background: linear-gradient(90deg, #9bdcff, #c4a8ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .shellTag {
        font-size: 0.68rem;
        color: #7a8aa3;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .modeRail {
        grid-area: rail;
        display: flex;
        align-items: stretch;
        padding: 3px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(100, 130, 180, 0.28);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .modeTab {
        appearance: none;
        border: none;
        margin: 0;
        padding: 0.45rem 1.35rem;
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        cursor: pointer;
        color: #8b9cb8;
        background: transparent;
        transition: color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      }
      .modeTab:hover {
        color: #c5d4eb;
      }
      #app[data-app-mode="train"] #modeTabTrain,
      #app[data-app-mode="infer"] #modeTabInfer {
        color: #0a0e14;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
      }
      #app[data-app-mode="train"] #modeTabTrain {
        background: linear-gradient(145deg, #ffc46d, #f59e0b);
      }
      #app[data-app-mode="infer"] #modeTabInfer {
        background: linear-gradient(145deg, #6ee7ff, #22d3ee);
      }
      .modeHint {
        margin: 0;
        padding: 0 0.5rem;
        font-size: 0.62rem;
        color: #5c6a82;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        pointer-events: none;
        white-space: nowrap;
      }
      @media (max-width: 720px) {
        #shellChrome {
          grid-template-columns: 1fr;
          grid-template-areas:
            "brand"
            "rail"
            "status";
          justify-items: stretch;
        }
        .modeRailOuter { width: 100%; }
        .modeRail { align-self: center; }
        .modeHint { display: none; }
        #status { text-align: left; }
      }
      .shellStatusWrap {
        grid-area: status;
        justify-self: end;
        min-width: 0;
        max-width: 100%;
      }
      #status {
        display: block;
        font-size: 0.78rem;
        color: #9fb0c9;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-variant-numeric: tabular-nums;
        padding: 0.35rem 0.65rem;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(80, 100, 140, 0.25);
        max-width: min(52vw, 28rem);
      }
      @media (max-width: 720px) {
        #status { max-width: 100%; }
      }
      #shellStage {
        flex: 1;
        display: grid;
        grid-template-columns: minmax(0, 1fr) clamp(280px, 30vw, 440px);
        min-height: 0;
      }
      @media (max-width: 900px) {
        #shellStage {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(200px, 42vh) minmax(0, 1fr);
        }
      }
      #vizWrap {
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      #viz {
        flex: 1;
        min-height: 0;
        position: relative;
      }
      #viz canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #shellDock {
        min-height: 0;
        min-width: 0;
        display: flex;
        flex-direction: column;
        background: rgba(8, 11, 18, 0.72);
        border-left: 1px solid rgba(88, 120, 168, 0.18);
        backdrop-filter: blur(10px);
      }
      @media (max-width: 900px) {
        #shellDock {
          border-left: none;
          border-top: 1px solid rgba(88, 120, 168, 0.18);
        }
      }
      #app[data-app-mode="train"] #shellDock {
        box-shadow: inset 4px 0 0 -1px rgba(245, 158, 11, 0.45);
      }
      #app[data-app-mode="infer"] #shellDock {
        box-shadow: inset 4px 0 0 -1px rgba(34, 211, 238, 0.5);
      }
      @media (max-width: 900px) {
        #app[data-app-mode="train"] #shellDock {
          box-shadow: inset 0 4px 0 -1px rgba(245, 158, 11, 0.45);
        }
        #app[data-app-mode="infer"] #shellDock {
          box-shadow: inset 0 4px 0 -1px rgba(34, 211, 238, 0.5);
        }
      }
      .shellDockPanel {
        flex: 1;
        min-height: 0;
        overflow: auto;
        display: flex;
        flex-direction: column;
        padding: 0.75rem 0.85rem 1rem;
        gap: 0.65rem;
      }
      .shellDockPanel[hidden] {
        display: none !important;
      }
      .dockBlock {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        align-items: center;
      }
      .dockBlock button,
      .dockBlock label,
      .dockBlock select,
      .dockBlock input {
        cursor: pointer;
      }
      .dockBlock button,
      .dockBlock select,
      .dockBlock input {
        padding: 0.38rem 0.62rem;
        border-radius: 8px;
        border: 1px solid rgba(100, 130, 170, 0.35);
        background: rgba(22, 30, 48, 0.95);
        color: inherit;
        font-size: 0.8rem;
      }
      .dockBlock button:disabled,
      .dockBlock select:disabled,
      .dockBlock input:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .dockBlock label {
        font-size: 0.78rem;
        color: #9aaac4;
      }
      #modelSelect {
        flex: 1 1 12rem;
        min-width: 8rem;
      }
      #drawCanvas {
        border: 1px solid rgba(100, 130, 170, 0.35);
        border-radius: 10px;
        background: #000;
        touch-action: none;
        width: 100%;
        max-width: 360px;
        height: auto;
        aspect-ratio: 1;
        align-self: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      }
      #drawActions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        max-width: 360px;
        width: 100%;
        align-self: center;
      }
      #drawActions button {
        padding: 0.45rem 0.55rem;
        border-radius: 8px;
        border: 1px solid rgba(100, 130, 170, 0.35);
        background: rgba(22, 30, 48, 0.95);
        color: inherit;
        cursor: pointer;
        font-size: 0.8rem;
      }
      #drawActions button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      #hint {
        font-size: 0.72rem;
        color: #6b7c95;
        line-height: 1.45;
        margin-top: auto;
      }
      #epochTrackWrap {
        flex: 1;
        min-height: 7rem;
        max-height: min(38vh, 22rem);
        overflow: auto;
        border-radius: 10px;
        padding: 0.5rem 0.55rem;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(80, 100, 140, 0.22);
      }
      #epochTrackHeader {
        margin: 0 0 0.45rem 0;
        font-size: 0.72rem;
        color: #7d8fab;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      #epochTrackList {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }
      .epochRow {
        display: grid;
        grid-template-columns: 3.4rem 4.2rem 1fr auto;
        align-items: center;
        gap: 0.45rem;
        border-radius: 8px;
        padding: 0.38rem 0.45rem;
        background: rgba(16, 22, 34, 0.9);
        border: 1px solid rgba(80, 100, 140, 0.2);
        font-size: 0.72rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-variant-numeric: tabular-nums;
      }
      .epochRun { color: #8b9cb8; }
      .epochNum { color: #dce6f2; }
      .epochLoss { color: #fbbf77; }
      .epochAcc { color: #6ee7b7; }
      .epochMeta {
        grid-column: 1 / -1;
        color: #6b7c95;
        font-size: 0.68rem;
        border-top: 1px solid rgba(60, 80, 110, 0.35);
        padding-top: 0.28rem;
      }
      .epochEmpty {
        font-size: 0.74rem;
        color: #6b7c95;
        border: 1px dashed rgba(100, 130, 170, 0.3);
        border-radius: 8px;
        padding: 0.65rem;
      }
      .inferLead {
        font-size: 0.78rem;
        color: #9aaac4;
        line-height: 1.4;
        margin: 0;
        max-width: 360px;
        align-self: center;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="app" data-app-mode="train">
      <header id="shellChrome">
        <div class="shellBrand">
          <span class="shellLogo">Neuronal3D</span>
          <span class="shellTag">MLP · 784 → 64 → 32 → 10</span>
        </div>
        <div class="modeRailOuter">
          <nav class="modeRail" role="tablist" aria-label="Arbeitsmodus">
            <button type="button" id="modeTabTrain" class="modeTab" role="tab" aria-selected="true" aria-controls="dockTrain">Training</button>
            <button type="button" id="modeTabInfer" class="modeTab" role="tab" aria-selected="false" aria-controls="dockInfer">Inferenz</button>
          </nav>
          <span class="modeHint" aria-hidden="true">Alt+1 · Alt+2</span>
        </div>
        <div class="shellStatusWrap">
          <span id="status">CSV laden …</span>
        </div>
      </header>
      <div id="shellStage">
        <div id="vizWrap">
          <div id="viz"></div>
        </div>
        <aside id="shellDock" aria-label="Steuerung">
          <div id="dockTrain" class="shellDockPanel" role="tabpanel" aria-labelledby="modeTabTrain">
            <div class="dockBlock">
              <button id="btnTrain" type="button" disabled>Training starten</button>
              <button id="btnPause" type="button" disabled>Pause</button>
            </div>
            <div class="dockBlock">
              <select id="modelSelect"></select>
            </div>
            <div class="dockBlock">
              <button id="btnLoadModel" type="button" disabled>Modell laden</button>
              <button id="btnSaveModelAs" type="button" disabled>Als neuen Stand speichern</button>
              <button id="btnResetModel" type="button" disabled>Aktives Modell neu initialisieren</button>
            </div>
            <div class="dockBlock">
              <label for="datasetSelect">Datensatz</label>
              <select id="datasetSelect">
                <option value="mnist">MNIST</option>
                <option value="usps">USPS</option>
                <option value="emnistDigits">EMNIST Digits</option>
              </select>
              <label for="epochsInput">Epochs</label>
              <input id="epochsInput" type="number" min="1" max="200" step="1" value="1" />
              <label for="lrInput">LR</label>
              <input id="lrInput" type="number" min="0.0001" max="1" step="0.0001" value="0.02" />
              <label for="batchSizeInput">Batch</label>
              <input id="batchSizeInput" type="number" min="1" max="512" step="1" value="32" />
              <label for="vizEveryInput">Viz</label>
              <input id="vizEveryInput" type="number" min="1" max="1000" step="1" value="4" />
            </div>
            <div id="epochTrackWrap">
              <p id="epochTrackHeader">Epoch-Tracking</p>
              <ul id="epochTrackList"></ul>
            </div>
            <div id="hint">CSV-Format: erste Spalte Label 0–9, danach 784 Pixel 0–255. Dateipfade: /data/csv/{mnist|usps|emnist_digits}_{train|test}.csv</div>
          </div>
          <div id="dockInfer" class="shellDockPanel" role="tabpanel" aria-labelledby="modeTabInfer" hidden>
            <p class="inferLead">Testbild oder Zeichenfläche — die 3D-Aktivierungen aktualisieren sich live.</p>
            <div class="dockBlock">
              <button id="btnInferRandom" type="button" disabled>Zufälliges Testbild</button>
            </div>
            <canvas id="drawCanvas" width="320" height="320"></canvas>
            <div id="drawActions">
              <button id="btnInferDraw" type="button" disabled>Canvas inferieren</button>
              <button id="btnClearDraw" type="button">Canvas leeren</button>
            </div>
          </div>
        </aside>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
