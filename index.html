<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neuronal3D</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; background: #0d1117; color: #e6edf3; }
      #app { display: flex; flex-direction: column; height: 100%; }
      #toolbar { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0.5rem; align-items: center; background: #161b22; border-bottom: 1px solid #30363d; }
      #toolbar button, #toolbar label, #toolbar select, #toolbar input { cursor: pointer; }
      #toolbar button, #toolbar select, #toolbar input { padding: 0.35rem 0.65rem; border: 1px solid #30363d; border-radius: 6px; background: #21262d; color: inherit; }
      #toolbar button:disabled, #toolbar select:disabled, #toolbar input:disabled { opacity: 0.5; cursor: not-allowed; }
      #viz { flex: 1; min-height: 0; position: relative; }
      #viz canvas { display: block; width: 100%; height: 100%; }
      #status {
        font-size: 0.85rem;
        color: #8b949e;
        margin-left: auto;
        white-space: pre;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-variant-numeric: tabular-nums;
      }
      #drawPanel {
        flex: 0 0 auto;
        width: clamp(320px, 32vw, 480px);
        min-width: min(100%, 320px);
        max-width: 100%;
        padding: 0.65rem;
        background: #161b22;
        border-left: 1px solid #30363d;
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
        min-height: 0;
      }
      #drawCanvas { border: 1px solid #30363d; border-radius: 6px; background: #000; touch-action: none; width: 100%; max-width: 400px; height: auto; aspect-ratio: 1; align-self: center; }
      #drawActions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
      }
      #drawActions button {
        padding: 0.4rem 0.6rem;
        border: 1px solid #30363d;
        border-radius: 6px;
        background: #21262d;
        color: inherit;
        cursor: pointer;
      }
      #drawActions button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #hint { font-size: 0.75rem; color: #8b949e; line-height: 1.35; }
      #epochTrackWrap {
        flex: 1;
        min-height: 10rem;
        max-height: min(42vh, 28rem);
        overflow: auto;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 0.45rem 0.55rem;
        background: #0d1117;
      }
      #epochTrackHeader {
        margin: 0 0 0.5rem 0;
        font-size: 0.78rem;
        color: #8b949e;
        letter-spacing: 0.02em;
      }
      #epochTrackList {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }
      .epochRow {
        display: grid;
        grid-template-columns: 3.4rem 4.2rem 1fr auto;
        align-items: center;
        gap: 0.45rem;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 0.38rem 0.45rem;
        background: #111827;
        font-size: 0.75rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-variant-numeric: tabular-nums;
      }
      .epochRun {
        color: #a6b3c2;
      }
      .epochNum {
        color: #dce6f2;
      }
      .epochLoss {
        color: #f2c97d;
      }
      .epochAcc {
        color: #7fd7a2;
      }
      .epochMeta {
        grid-column: 1 / -1;
        color: #8b949e;
        font-size: 0.72rem;
        border-top: 1px solid #1f2937;
        padding-top: 0.3rem;
      }
      .epochEmpty {
        font-size: 0.76rem;
        color: #8b949e;
        border: 1px dashed #30363d;
        border-radius: 6px;
        padding: 0.6rem;
      }
      #mainRow { display: flex; flex: 1; min-height: 0; }
      #vizWrap { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <button id="btnTrain" type="button" disabled>Training starten</button>
        <button id="btnPause" type="button" disabled>Pause</button>
        <select id="modelSelect"></select>
        <button id="btnLoadModel" type="button" disabled>Modell laden</button>
        <button id="btnSaveModelAs" type="button" disabled>Als neuen Stand speichern</button>
        <button id="btnResetModel" type="button" disabled>Aktives Modell neu initialisieren</button>
        <label for="datasetSelect">Datensatz</label>
        <select id="datasetSelect">
          <option value="mnist">MNIST</option>
          <option value="usps">USPS</option>
          <option value="emnistDigits">EMNIST Digits</option>
        </select>
        <label for="epochsInput">Epochs</label>
        <input id="epochsInput" type="number" min="1" max="200" step="1" value="1" />
        <label for="lrInput">LR</label>
        <input id="lrInput" type="number" min="0.0001" max="1" step="0.0001" value="0.02" />
        <label for="batchSizeInput">Batch</label>
        <input id="batchSizeInput" type="number" min="1" max="512" step="1" value="32" />
        <label for="vizEveryInput">Viz</label>
        <input id="vizEveryInput" type="number" min="1" max="1000" step="1" value="4" />
        <button id="btnInferRandom" type="button" disabled>Zufälliges Testbild</button>
        <span id="status">CSV laden …</span>
      </div>
      <div id="mainRow">
        <div id="vizWrap">
          <div id="viz"></div>
        </div>
        <div id="drawPanel">
          <canvas id="drawCanvas" width="320" height="320"></canvas>
          <div id="drawActions">
            <button id="btnInferDraw" type="button" disabled>Canvas inferieren</button>
            <button id="btnClearDraw" type="button">Canvas leeren</button>
          </div>
          <div id="epochTrackWrap">
            <p id="epochTrackHeader">Epoch-Tracking</p>
            <ul id="epochTrackList"></ul>
          </div>
          <div id="hint">CSV-Format: erste Spalte Label 0–9, danach 784 Pixel 0–255. Dateipfade: /data/csv/{mnist|usps|emnist_digits}_{train|test}.csv</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
